<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>发布到 TikTok — 演示</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 520px; margin: 0 auto; padding: 1.5rem; background: #f5f5f5; }
    .card { background: #fff; border-radius: 12px; padding: 1.25rem; margin-bottom: 1rem; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
    h1 { font-size: 1.25rem; }
    .creator { display: flex; align-items: center; gap: 0.75rem; }
    .avatar { width: 48px; height: 48px; border-radius: 50%; background: #ddd; }
    label { display: block; margin: 0.75rem 0 0.25rem; font-weight: 600; font-size: 0.9rem; }
    select, textarea { width: 100%; padding: 0.5rem; font-size: 1rem; }
    textarea { min-height: 100px; }
    .checks label { font-weight: normal; display: flex; gap: 0.5rem; margin: 0.5rem 0; }
    .legal { font-size: 0.8rem; color: #444; background: #fafafa; padding: 0.75rem; border-radius: 8px; margin-top: 0.75rem; }
    button { width: 100%; padding: 0.75rem; margin-top: 1rem; background: #fe2c55; color: #fff; border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .hint { font-size: 0.85rem; color: #666; }
  </style>
</head>
<body>
  <p><a href="index.html">← 首页</a></p>
  <h1>发布到 TikTok（演示页）</h1>
  <p class="hint">录屏审核用：展示创作者信息、隐私下拉（无默认）、互动选项、音乐确认。非真实 API 调用。</p>

  <div class="card">
    <div class="creator">
      <div class="avatar" aria-hidden="true"></div>
      <div>
        <strong id="nick">创作者昵称</strong><br />
        <span class="hint">@creator_username</span>
      </div>
    </div>
  </div>

  <div class="card">
    <label for="privacy">谁可以看 *</label>
    <select id="privacy" required>
      <option value="" selected disabled>请选择隐私设置</option>
      <option value="PUBLIC_TO_EVERYONE">所有人</option>
      <option value="MUTUAL_FOLLOW_FRIENDS">互关好友</option>
      <option value="FOLLOWER_OF_CREATOR">粉丝</option>
      <option value="SELF_ONLY">仅自己</option>
    </select>

    <label for="caption">说明</label>
    <textarea id="caption" placeholder="视频标题与话题…"></textarea>

    <p style="margin-top:0.75rem;font-weight:600;font-size:0.9rem;">互动</p>
    <div class="checks">
      <label><input type="checkbox" id="allow_comment" /> 允许评论</label>
      <label><input type="checkbox" id="allow_duet" /> 允许合拍</label>
      <label><input type="checkbox" id="allow_stitch" /> 允许拼接</label>
    </div>

    <div class="legal" id="musicNotice">
      发布即表示您同意 TikTok 的音乐使用确认条款。
      <a href="https://www.tiktok.com/legal/page/global/music-usage-confirmation/en" target="_blank" rel="noopener">查看音乐使用说明</a>
    </div>

    <label style="margin-top:0.75rem"><input type="checkbox" id="agree" /> 我已阅读并同意上述说明</label>

    <button type="button" id="submit" disabled>发布到 TikTok</button>
    <p id="status" class="hint" style="margin-top:0.5rem"></p>
  </div>

  <script>
    const privacy = document.getElementById('privacy');
    const agree = document.getElementById('agree');
    const submit = document.getElementById('submit');
    const status = document.getElementById('status');
    function valid() {
      return privacy.value && agree.checked;
    }
    [privacy, agree].forEach(el => el.addEventListener('change', () => {
      submit.disabled = !valid();
    }));
    submit.addEventListener('click', () => {
      status.textContent = '（演示）已模拟提交：隐私=' + privacy.value + '，将调用 Content Posting API Direct Post。';
    });
  </script>
</body>
</html>
